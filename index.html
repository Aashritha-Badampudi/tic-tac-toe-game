<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>

  <!-- Link to our CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Game Title -->
    <h1 class="title">Tic Tac Toe</h1>

    <!-- Shows whose turn it is, or the result -->
    <p id="status" class="status">Player X's Turn</p>

    <!-- The 3x3 game board -->
    <div id="board" class="board">
      <!-- 9 cells, each gets a data-index so JavaScript can identify them -->
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <!-- Reset button to restart the game -->
    <button id="resetBtn" class="reset-btn">Reset Game</button>

  </div>

  <!-- Link to our JavaScript file (placed at the bottom so HTML loads first) -->
  <script src="script.js"></script>

</body>
</html>
